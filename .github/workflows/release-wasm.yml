name: Release WASM

on:
  push:
    tags:
      - '0.0.1'
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build WASM
        run: |
          make build_wasm
          cp bin/cdd-kotlin.wasm .
      - name: Release WASM Artifact
        uses: softprops/action-gh-release@v2
        with:
          files: cdd-kotlin.wasm
