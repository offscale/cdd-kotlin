name: CI

on:
  push:
    branches: [ "master", "main" ]
    tags:
      - "v*"
      - "*.*.*"
  pull_request:
    branches: [ "master", "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Checkout OpenAPI Test Harness
        uses: actions/checkout@v6
        with:
          repository: SamuelMarks/cdd-openapi-test-harness
          path: cdd-openapi-test-harness

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Format Check
        run: ./gradlew spotlessCheck --stacktrace

      - name: Build
        run: ./gradlew assemble --stacktrace

      - name: Run Tests
        run: ./gradlew allTests --stacktrace

      - name: Lint and Verify
        run: ./gradlew check --stacktrace

      - name: Swagger 2.0 Petstore test
        run: ./cdd.sh to_sdk -i ./cdd-openapi-test-harness/petstore.json

      - name: OpenAPI 3.2.0 Petstore test
        run: ./cdd.sh to_sdk -i ./cdd-openapi-test-harness/petstore_oas3.json

      - name: Build WASM
        run: make build_wasm

      - name: Install binaryen
        run: sudo apt-get update && sudo apt-get install -y binaryen

      - name: Optimize WASM
        run: |
          for f in bin/*.wasm; do
            if [ -f "$f" ]; then
              wasm-opt -O3 "$f" -o "$f" || true
            fi
          done

      - name: Update latest tag
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag -f latest
          git push origin -f latest

      - name: Release WASM Artifact
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
          files: "bin/*.wasm"
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
