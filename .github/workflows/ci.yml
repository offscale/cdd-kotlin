name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Checkout OpenAPI Test Harness
        uses: actions/checkout@v6
        with:
          repository: SamuelMarks/cdd-openapi-test-harness
          path: cdd-openapi-test-harness

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Format Check
        run: ./gradlew spotlessCheck --stacktrace

      - name: Build
        run: ./gradlew assemble --stacktrace

      - name: Run Tests
        run: ./gradlew allTests --stacktrace

      - name: Lint and Verify
        run: ./gradlew check --stacktrace

      - name: Swagger 2.0 Petstore test
        run: ./cdd.sh to_sdk -i ./cdd-openapi-test-harness/petstore.json

      - name: OpenAPI 3.2.0 Petstore test
        run: ./cdd.sh to_sdk -i ./cdd-openapi-test-harness/petstore_oas3.json

      - name: Build WASM
        run: make build_wasm
