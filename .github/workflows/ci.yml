name: CI

on:
  push:
    branches: [ "master", "main" ]
    tags:
      - "v*"
  pull_request:
    branches: [ "master", "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Checkout OpenAPI Test Harness
        uses: actions/checkout@v6
        with:
          repository: SamuelMarks/cdd-openapi-test-harness
          path: cdd-openapi-test-harness

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Format Check
        run: ./gradlew spotlessCheck --stacktrace

      - name: Build
        run: ./gradlew assemble --stacktrace

      - name: Run Tests
        run: ./gradlew allTests --stacktrace

      - name: Lint and Verify
        run: ./gradlew check --stacktrace

      - name: Swagger 2.0 Petstore test
        run: ./cdd.sh to_sdk -i ./cdd-openapi-test-harness/petstore.json

      - name: OpenAPI 3.2.0 Petstore test
        run: ./cdd.sh to_sdk -i ./cdd-openapi-test-harness/petstore_oas3.json

      - name: Build WASM
        run: make build_wasm

      - name: Install binaryen
        run: sudo apt-get update && sudo apt-get install -y binaryen

      - name: Optimize WASM
        run: |
          for f in bin/*.wasm; do
            if [ -f "$f" ]; then
              wasm-opt -O3 "$f" -o "$f" || true
            fi
          done

      - name: Update snapshot tag
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag -f snapshot
          git push origin -f snapshot

      - name: Update latest tag
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag -f latest
          git push origin -f latest

      - name: Release WASM Artifact
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG_NAME="${{ github.ref_name }}"
            gh release create "$TAG_NAME" bin/*.wasm --title "$TAG_NAME" --generate-notes
            
            # Recreate latest release
            gh release delete latest -y || true
            gh release create latest bin/*.wasm --title "Latest Release" --notes "Latest stable release: $TAG_NAME"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG_NAME="${{ github.ref_name }}"
            gh release create "$TAG_NAME" bin/*.wasm --title "$TAG_NAME" --generate-notes
          else
            TAG_NAME="snapshot"
            gh release delete "$TAG_NAME" -y || true
            gh release create "$TAG_NAME" bin/*.wasm --prerelease --title "$TAG_NAME" --notes "Latest master build"
          fi
