name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Build
      run: ./gradlew build installDist jsBrowserProductionWebpack
      
    - name: Zip distributions
      run: |
        cd build/install
        zip -r cdd-kotlin-cli.zip cdd-kotlin
        cd ../..
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          build/install/cdd-kotlin-cli.zip
          build/dist/js/productionExecutable/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
